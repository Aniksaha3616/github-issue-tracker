<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>GitHub Issues Tracker</title>

    <!-- Fontawesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" />

    <!-- Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- DaisyUI + Tailwind -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

</head>

<body class="bg-gray-100 font-[Geist]">

    <!-- Navbar -->

    <div class="navbar bg-white shadow px-8">

        <div class="flex-1 flex items-center gap-2">

            <img src="./assets/github-logo.png" class="w-8">

            <h1 class="font-bold text-lg">
                GitHub Issues Tracker
            </h1>

        </div>

        <div class="flex gap-2">

            <input id="searchInput" class="input input-bordered" placeholder="Search issues...">

            <button onclick="searchIssues()" class="btn btn-primary">

                Search

            </button>

        </div>

    </div>

    <!-- Main -->

    <div class="max-w-7xl mx-auto p-6">

        <!-- Tabs -->

        <div class="tabs tabs-boxed w-fit mb-6">

            <a id="tabAll" class="tab tab-active" onclick="setFilter('all')">All</a>

            <a id="tabOpen" class="tab" onclick="setFilter('open')">Open</a>

            <a id="tabClosed" class="tab" onclick="setFilter('closed')">Closed</a>

        </div>

        <!-- Issue count -->

        <div class="flex justify-between items-center mb-6">

            <div class="flex items-center gap-3">

                <div class="badge badge-primary">
                    Issues
                </div>

                <h2>
                    <span id="issueCount">0</span> Issues
                </h2>

            </div>

            <div class="text-sm">

                <span class="text-green-600">
                    ● Open
                </span>

                <span class="ml-3 text-purple-600">
                    ● Closed
                </span>

            </div>

        </div>

        <!-- Loading -->

        <div id="loading" class="flex justify-center my-10">

            <span class="loading loading-spinner loading-lg"></span>

        </div>

        <!-- Issues Grid -->

        <div id="issuesContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">

        </div>

    </div>

    <!-- Modal -->

    

    <script src="./Script/issues.js"></script>

</body>

</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub-Issue-Tracker</title>
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon" />
    <!-- fontawasome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- Font family -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <!-- tailwind+daisyui -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- stylesheet -->
     <link rel="stylesheet" href="./style/style.css">
</head>
<body class="bg-gray-100 flex items-center justify-center h-screen">
    <div class="card w-96 bg-white-100 shadow-xl p-6">
    
        <div class="flex flex-col items-center">
    
            <img src="./assets/github-logo.png" class="w-16">
    
            <h2 class="text-xl font-bold mt-3">GitHub Issues Tracker</h2>
            <p class="text-sm text-gray-500">Sign in to manage your issues</p>
    
        </div>
    
        <form id="loginForm" class="mt-5">
    
            <label class="label font-semibold text-neutral-800  ">Username</label>
            <input id="username" type="text" placeholder="Enter Username" class="input input-bordered w-full mb-1">
            <span class="font-light text-primary pt-1  ">Default: admin</span> <br>
            <label class="label mt-3 font-semibold text-neutral-800">Password</label>
            <input id="password" type="password" placeholder="Enter Password" class="input input-bordered w-full mb-1">
            <span class="text-primary font-light">Default: admin123</span> <br>
            <button class="btn btn-primary w-full mt-4 rounded-lg">Sign In</button>
    
        </form>
    
        <div class="divider">OR</div>
    
        <div class="text-sm text-center bg-neutral-200">
            <p class="font-semibold">Demo Credentials</p>
            <p>Username: admin</p>
            <p>Password: admin123</p>
        </div>
    
    </div>
</body>
</html>
